x-api-env: &api-env
  ENV_MODE: production
  SERVICE_NAME: rinha-2026
  LOG_LEVEL: warn
  LOG_FORMAT: json
  READ_TIMEOUT: 3s
  WRITE_TIMEOUT: 3s
  IDLE_TIMEOUT: 120s
  SHUTDOWN_TIMEOUT: 20s
  MAX_HEADER_BYTES: "8192"
  DATASET_PATH: /data/vectors.bin
  TREE_PATH: /data/fraud_dt.bin
  HYBRID_ENABLED: "true"
  HYBRID_LO: "0.2"
  HYBRID_HI: "0.8"
  GOMAXPROCS: "1"
  GOGC: "200"
  GOMEMLIMIT: "140MiB"
  WARMUP_ITERS: "500"
  STEADY_GC_OFF: "true"
  STEADY_GC_INTERVAL: "5s"
  SHED_SLOTS: "0"
  SHED_TIMEOUT: "3ms"
  USE_RAWHTTP: "false"

x-api: &api-defaults
  image: ghcr.io/vinnedev/rinha-2026-api:v5-optimized
  platform: linux/amd64
  networks:
    - rinha
  volumes:
    - sockets:/sockets
  restart: unless-stopped
  stop_grace_period: 25s

services:
  api1:
    <<: *api-defaults
    container_name: rinha-api-1
    hostname: api1
    environment:
      <<: *api-env
      SOCKET_PATH: /sockets/api1.sock
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

  api2:
    <<: *api-defaults
    container_name: rinha-api-2
    hostname: api2
    environment:
      <<: *api-env
      SOCKET_PATH: /sockets/api2.sock
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

  lb:
    image: haproxy:3.0-alpine
    platform: linux/amd64
    container_name: rinha-lb
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    command: ["haproxy", "-f", "/usr/local/etc/haproxy/haproxy.cfg", "-db"]
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - rinha
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.16"
          memory: "30MB"

  warmup:
    image: curlimages/curl:8.10.1
    platform: linux/amd64
    container_name: rinha-warmup
    entrypoint: ["/bin/sh", "/warmup.sh"]
    environment:
      BASE_URL: http://lb:9999
      READY_RETRIES: "240"
      READY_SLEEP: "0.25"
      WARMUP_ROUNDS: "120"
    volumes:
      - ./warmup.sh:/warmup.sh:ro
    depends_on:
      - lb
    networks:
      - rinha
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.02"
          memory: "6MB"

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
