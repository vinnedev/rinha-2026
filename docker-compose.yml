x-api-env: &api-env
  ENV_MODE: production
  SERVICE_NAME: rinha-2026
  LOG_LEVEL: warn
  LOG_FORMAT: json
  READ_HEADER_TIMEOUT: 2s
  READ_TIMEOUT: 5s
  WRITE_TIMEOUT: 10s
  IDLE_TIMEOUT: 120s
  SHUTDOWN_TIMEOUT: 20s
  MAX_HEADER_BYTES: "16384"
  DATASET_PATH: /data/vectors.bin
  TREE_PATH: /data/fraud_dt.bin
  HYBRID_ENABLED: "true"
  HYBRID_LO: "0.2"
  HYBRID_HI: "0.8"
  GOMAXPROCS: "4"
  GOGC: "200"
  GOMEMLIMIT: "30MiB"

x-api: &api-defaults
  build:
    context: .
    dockerfile: Dockerfile
    target: api
  image: rinha-2026-api:latest
  platform: linux/amd64
  networks:
    - rinha
  volumes:
    - sockets:/sockets
  restart: unless-stopped
  stop_grace_period: 25s

services:
  api1:
    <<: *api-defaults
    container_name: rinha-api-1
    hostname: api1
    environment:
      <<: *api-env
      SOCKET_PATH: /sockets/api1.sock
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

  api2:
    <<: *api-defaults
    container_name: rinha-api-2
    hostname: api2
    environment:
      <<: *api-env
      SOCKET_PATH: /sockets/api2.sock
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

  lb:
    build:
      context: .
      dockerfile: Dockerfile
      target: lb
    image: rinha-2026-lb:latest
    platform: linux/amd64
    container_name: rinha-lb
    depends_on:
      - api1
      - api2
    environment:
      PORT: "9999"
      UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      GOMAXPROCS: "2"
      GOGC: "200"
      GOMEMLIMIT: "20MiB"
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
    networks:
      - rinha
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.16"
          memory: "30MB"

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
