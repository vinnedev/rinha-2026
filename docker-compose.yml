x-api-env: &api-env
  ENV_MODE: production
  SERVICE_NAME: rinha-2026
  LOG_LEVEL: warn
  LOG_FORMAT: json
  DATASET_PATH: /data/vectors.bin
  TREE_PATH: /data/fraud_dt.bin
  HYBRID_ENABLED: "true"
  HYBRID_LO: "0.2"
  HYBRID_HI: "0.8"
  STEADY_GC_OFF: "true"
  STEADY_GC_INTERVAL: 30s
  SHED_SLOTS: "4"
  WARMUP_ITERS: "500"
  GOMAXPROCS: "1"
  GOGC: "200"
  GOMEMLIMIT: "40MiB"

x-api: &api-defaults
  build:
    context: .
    dockerfile: Dockerfile
  image: rinha-2026-api:latest
  platform: linux/amd64
  networks:
    - rinha
  volumes:
    - sockets:/sockets
  restart: unless-stopped
  stop_grace_period: 25s

services:
  api1:
    <<: *api-defaults
    container_name: rinha-api-1
    hostname: api1
    environment:
      <<: *api-env
      SOCKET_PATH: /sockets/api1.sock
      CTRL_SOCKET_PATH: /sockets/api1.ctrl
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

  api2:
    <<: *api-defaults
    container_name: rinha-api-2
    hostname: api2
    environment:
      <<: *api-env
      SOCKET_PATH: /sockets/api2.sock
      CTRL_SOCKET_PATH: /sockets/api2.ctrl
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

  lb:
    image: rinha-2026-api:latest
    platform: linux/amd64
    container_name: rinha-lb
    depends_on:
      - api1
      - api2
    entrypoint: ["/lb"]
    environment:
      LB_ADDR: ":9999"
      LB_UPSTREAMS: "/sockets/api1.ctrl,/sockets/api2.ctrl"
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - rinha
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
