x-api-env: &api-env
  ENV_MODE: production
  SERVICE_NAME: rinha-2026
  LOG_LEVEL: warn
  LOG_FORMAT: json
  READ_TIMEOUT: 3s
  WRITE_TIMEOUT: 3s
  IDLE_TIMEOUT: 120s
  SHUTDOWN_TIMEOUT: 20s
  MAX_HEADER_BYTES: "8192"
  DATASET_PATH: /data/vectors.bin
  TREE_PATH: /data/fraud_dt.bin
  HYBRID_ENABLED: "true"
  HYBRID_LO: "0.2"
  HYBRID_HI: "0.8"
  GOMAXPROCS: "1"
  GOGC: "200"
  GOMEMLIMIT: "30MiB"

x-api: &api-defaults
  image: ghcr.io/vinnedev/rinha-2026-api:v6-optimized
  platform: linux/amd64
  networks:
    - rinha
  volumes:
    - sockets:/sockets
  restart: unless-stopped
  stop_grace_period: 25s

services:
  api1:
    <<: *api-defaults
    container_name: rinha-api-1
    hostname: api1
    environment:
      <<: *api-env
      SOCKET_PATH: /sockets/api1.sock
      CTRL_SOCKET_PATH: /sockets/api1.sock.ctrl
    security_opt:
      - seccomp:unconfined
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

  api2:
    <<: *api-defaults
    container_name: rinha-api-2
    hostname: api2
    environment:
      <<: *api-env
      SOCKET_PATH: /sockets/api2.sock
      CTRL_SOCKET_PATH: /sockets/api2.sock.ctrl
    security_opt:
      - seccomp:unconfined
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

  lb:
    image: jrblatt/so-no-forevis:v1.0.0
    platform: linux/amd64
    container_name: rinha-lb
    environment:
      UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      PORT: "9999"
      BUF_SIZE: "4096"
      WORKERS: "1"
    volumes:
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined
    networks:
      - rinha
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.16"
          memory: "30MB"

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
